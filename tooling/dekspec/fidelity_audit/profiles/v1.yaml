# Audit profile v1 — the baseline rule set as of dekspec v0.38.x.
#
# Authored 2026-05-12 per F-3 phase 1 schema field + F-3 phase 2 registry.
# This manifest enumerates every rule code emitted by linkage.py at the
# time v0.38.1 shipped. Default profile for all artifacts whose
# `audit_profile` field is absent or equals "v1".
#
# Mechanics: each rule listed under `rules:` is run by linkage.py during
# `dekspec audit linkage`. Parameters override the rule's defaults — when
# a rule appears in `parameters:`, the rule's implementation reads from
# the parameter map; otherwise the hardcoded default in linkage.py wins.
#
# Forward compat: v2 / v3 / ... inherit from a parent profile via the
# `inherits:` key and may add new rule codes, remove existing ones, or
# override parameters. Removed rules surface as "rule X disabled in
# profile vN" advisories in audit output; the rule's check is skipped.

profile: v1
inherits: null

# L2 is intentionally absent and reserved for a future "ADR → ADR
# non-supersession reference" rule (no such check exists today). Audit
# output should not flag the gap.

