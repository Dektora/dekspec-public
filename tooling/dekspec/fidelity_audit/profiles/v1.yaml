  # INT-020 — DRAFT-slug temp-ID + append-only registry safety nets
  - L-NO-DRAFT-IN-MAIN
  - L-REGISTRY-APPEND-ONLY

parameters:
  L11-MSN-STALE:
    days_threshold: 90

  # ADR-016 Open Issue 1 — repo-wide active-Intent backlog health. The rule
  # fires a single advisory (P3) finding when the count of active Intents
  # (DRAFT through MERGED) repo-wide EXCEEDS `threshold`. The default 10 is a
  # review-bandwidth heuristic; a consumer dials it per repo by editing only
  # this value — no code change. When absent, linkage.py falls back to its
  # `_INT_BACKLOG_ACTIVE_THRESHOLD` module-level default (also 10).
  L14-INT-BACKLOG-ACTIVE:
    threshold: 10

  # INT-065 — T-PROSE-* prose-shape family per-rule overrides.
  #
  # Each T-PROSE-* rule reads three knobs from its `parameters:` entry; when
  # a knob is absent the rule falls back to the conservative hardcoded
  # default in `prose_shape.py` (IB-109). A consumer repo dials any of these
  # per repo by editing only its audit profile — no code change.
  #
  #   threshold  the minimum number of the five PROSE facets a prose item
  #              must satisfy to PASS. An item below it draws an advisory
  #              finding. The conservative value 1 means only ZERO-facet,
  #              genuinely contentless prose is flagged. Raising it (2-5)
  #              makes the family stricter. `# calibrated by IB-111 against
  #              the self-spec corpus` — see test_prose_shape_rules.py.
  #   severity   the finding severity. The MVP floor is `P3` (advisory) —
  #              the family is warning-only and never blocks a build at P3.
  #              A consumer may raise it (e.g. `P2`) once calibrated.
  #   enabled    `false` turns the rule off entirely. (Omitting the rule
  #              code from the `rules:` list above also filters it out — the
  #              profile-filter is the canonical off switch; `enabled` is a
  #              convenience knob that does not require a `rules:` edit.)
  #
  # The shipped default is conservative (threshold 1 / severity P3) so the
  # family stays quiet on a methodology-practicing repo — IB-111's
  # calibration measured 3 advisory findings on the dekspec/ self-spec
  # corpus at this setting (2026-05-21).
  T-PROSE-WS-BUSINESS-RULE:
    threshold: 1
    severity: P3
  T-PROSE-WS-FAILURE-BEHAVIOR:
    threshold: 1
    severity: P3
  T-PROSE-IB-GOAL:
    threshold: 1
    severity: P3
  T-PROSE-IB-DONE-WHEN:
    threshold: 1
    severity: P3
  T-PROSE-AE-RESPONSIBILITY:
    threshold: 1
    severity: P3
