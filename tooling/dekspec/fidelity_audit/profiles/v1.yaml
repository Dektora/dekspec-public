  # Listed-and-active but conservatively thresholded (see `parameters:` below)
  # — every finding emits at P3 (advisory), so the family never blocks a build.
  - T-PROSE-WS-BUSINESS-RULE
  - T-PROSE-WS-FAILURE-BEHAVIOR
  - T-PROSE-IB-GOAL
  - T-PROSE-IB-DONE-WHEN
  - T-PROSE-AE-RESPONSIBILITY
